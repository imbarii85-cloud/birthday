<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Light Pillar Background — Demo</title>
<style>
  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    background: #05070f;
    overflow: hidden;
  }

  #pillar-container{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .demo-content{
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: sans-serif;
    pointer-events: none;
  }
  .demo-card{
    background: rgba(10, 15, 30, 0.5);
    border: 1px solid rgba(244,185,66,0.25);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    color: #FDF6E9;
  }
  .demo-card h1{ margin: 0 0 8px; font-size: 1.6rem; color: #F4B942; }
  .demo-card p{ margin: 0; opacity: 0.75; font-size: 0.9rem; }
</style>
</head>
<body>

<div id="pillar-container"></div>

<div class="demo-content">
  <div class="demo-card">
    <h1>Birthday Quiz Challenge</h1>
    <p>Yeh Light Pillar background quiz card ke peeche is tarah dikhega</p>
  </div>
</div>

<!-- three.js via CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/*
  ===== LIGHT PILLAR BACKGROUND (React Bits component, vanilla JS port) =====
  Yeh React Bits ke "LightPillar" component ka ORIGINAL WebGL shader hai —
  sirf React/JSX hata kar plain JavaScript class mein convert kiya hai,
  taake bina React/Vite project ke bhi seedha browser mein preview ho sakay.

  Colors ko birthday theme (gold -> coral) set kiya hai, purple/pink ki
  jagah — agar apna asal koi rang chahiye to neechay "initialize" wale
  hissay mein topColor/bottomColor badal dena.
*/

class LightPillar{
  constructor(container, options = {}){
    this.container = container;
    this.options = Object.assign({
      topColor: '#F4B942',      // gold
      bottomColor: '#FF6F61',   // coral
      intensity: 1.0,
      rotationSpeed: 0.3,
      interactive: false,
      glowAmount: 0.005,
      pillarWidth: 3.0,
      pillarHeight: 0.4,
      noiseIntensity: 0.5,
      pillarRotation: 0,
      quality: 'high'
    }, options);

    this.mouse = new THREE.Vector2(0, 0);
    this.time = 0;

    this.init();
  }

  parseColor(hex){
    const c = new THREE.Color(hex);
    return new THREE.Vector3(c.r, c.g, c.b);
  }

  init(){
    const { container, options } = this;
    const width = container.clientWidth;
    const height = container.clientHeight;

    this.scene = new THREE.Scene();
    this.camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const isLowEndDevice = isMobile || (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4);

    let effectiveQuality = options.quality;
    if(isLowEndDevice && effectiveQuality === 'high') effectiveQuality = 'medium';
    if(isMobile && effectiveQuality !== 'low') effectiveQuality = 'low';

    const qualitySettings = {
      low:    { iterations: 24, waveIterations: 1, pixelRatio: 0.5,  precision: 'mediump', stepMultiplier: 1.5 },
      medium: { iterations: 40, waveIterations: 2, pixelRatio: 0.65, precision: 'mediump', stepMultiplier: 1.2 },
      high:   { iterations: 80, waveIterations: 4, pixelRatio: Math.min(window.devicePixelRatio, 2), precision: 'highp', stepMultiplier: 1.0 }
    };
    const settings = qualitySettings[effectiveQuality] || qualitySettings.medium;

    this.renderer = new THREE.WebGLRenderer({
      antialias: false,
      alpha: true,
      powerPreference: effectiveQuality === 'high' ? 'high-performance' : 'low-power',
      precision: settings.precision,
      stencil: false,
      depth: false
    });
    this.renderer.setSize(width, height);
    this.renderer.setPixelRatio(settings.pixelRatio);
    container.appendChild(this.renderer.domElement);

    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      precision ${settings.precision} float;

      uniform float uTime;
      uniform vec2 uResolution;
      uniform vec2 uMouse;
      uniform vec3 uTopColor;
      uniform vec3 uBottomColor;
      uniform float uIntensity;
      uniform bool uInteractive;
      uniform float uGlowAmount;
      uniform float uPillarWidth;
      uniform float uPillarHeight;
      uniform float uNoiseIntensity;
      uniform float uRotCos;
      uniform float uRotSin;
      uniform float uPillarRotCos;
      uniform float uPillarRotSin;
      uniform float uWaveSin;
      uniform float uWaveCos;
      varying vec2 vUv;

      const float STEP_MULT = ${settings.stepMultiplier.toFixed(1)};
      const int MAX_ITER = ${settings.iterations};
      const int WAVE_ITER = ${settings.waveIterations};

      void main() {
        vec2 uv = (vUv * 2.0 - 1.0) * vec2(uResolution.x / uResolution.y, 1.0);
        uv = vec2(uPillarRotCos * uv.x - uPillarRotSin * uv.y, uPillarRotSin * uv.x + uPillarRotCos * uv.y);

        vec3 ro = vec3(0.0, 0.0, -10.0);
        vec3 rd = normalize(vec3(uv, 1.0));

        float rotC = uRotCos;
        float rotS = uRotSin;
        if(uInteractive && (uMouse.x != 0.0 || uMouse.y != 0.0)) {
          float a = uMouse.x * 6.283185;
          rotC = cos(a);
          rotS = sin(a);
        }

        vec3 col = vec3(0.0);
        float t = 0.1;

        for(int i = 0; i < MAX_ITER; i++) {
          vec3 p = ro + rd * t;
          p.xz = vec2(rotC * p.x - rotS * p.z, rotS * p.x + rotC * p.z);

          vec3 q = p;
          q.y = p.y * uPillarHeight + uTime;

          float freq = 1.0;
          float amp = 1.0;
          for(int j = 0; j < WAVE_ITER; j++) {
            q.xz = vec2(uWaveCos * q.x - uWaveSin * q.z, uWaveSin * q.x + uWaveCos * q.z);
            q += cos(q.zxy * freq - uTime * float(j) * 2.0) * amp;
            freq *= 2.0;
            amp *= 0.5;
          }

          float d = length(cos(q.xz)) - 0.2;
          float bound = length(p.xz) - uPillarWidth;
          float k = 4.0;
          float h = max(k - abs(d - bound), 0.0);
          d = max(d, bound) + h * h * 0.0625 / k;
          d = abs(d) * 0.15 + 0.01;

          float grad = clamp((15.0 - p.y) / 30.0, 0.0, 1.0);
          col += mix(uBottomColor, uTopColor, grad) / d;

          t += d * STEP_MULT;
          if(t > 50.0) break;
        }

        float widthNorm = uPillarWidth / 3.0;
        col = tanh(col * uGlowAmount / widthNorm);

        col -= fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) / 15.0 * uNoiseIntensity;

        gl_FragColor = vec4(col * uIntensity, 1.0);
      }
    `;

    const pillarRotRad = (options.pillarRotation * Math.PI) / 180;
    const waveSin = Math.sin(0.4);
    const waveCos = Math.cos(0.4);

    this.material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uTime: { value: 0 },
        uResolution: { value: new THREE.Vector2(width, height) },
        uMouse: { value: this.mouse },
        uTopColor: { value: this.parseColor(options.topColor) },
        uBottomColor: { value: this.parseColor(options.bottomColor) },
        uIntensity: { value: options.intensity },
        uInteractive: { value: options.interactive },
        uGlowAmount: { value: options.glowAmount },
        uPillarWidth: { value: options.pillarWidth },
        uPillarHeight: { value: options.pillarHeight },
        uNoiseIntensity: { value: options.noiseIntensity },
        uRotCos: { value: 1.0 },
        uRotSin: { value: 0.0 },
        uPillarRotCos: { value: Math.cos(pillarRotRad) },
        uPillarRotSin: { value: Math.sin(pillarRotRad) },
        uWaveSin: { value: waveSin },
        uWaveCos: { value: waveCos }
      },
      transparent: true,
      depthWrite: false,
      depthTest: false
    });

    const geometry = new THREE.PlaneGeometry(2, 2);
    const mesh = new THREE.Mesh(geometry, this.material);
    this.scene.add(mesh);

    if(options.interactive){
      let moveTimeout = null;
      container.addEventListener('mousemove', (e) => {
        if(moveTimeout) return;
        moveTimeout = window.setTimeout(() => { moveTimeout = null; }, 16);
        const rect = container.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        this.mouse.set(x, y);
      }, { passive: true });
    }

    window.addEventListener('resize', () => this.onResize());

    this.lastTime = performance.now();
    const targetFPS = effectiveQuality === 'low' ? 30 : 60;
    this.frameTime = 1000 / targetFPS;

    this.animate = this.animate.bind(this);
    requestAnimationFrame(this.animate);
  }

  onResize(){
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;
    this.renderer.setSize(w, h);
    this.material.uniforms.uResolution.value.set(w, h);
  }

  animate(currentTime){
    const deltaTime = currentTime - this.lastTime;

    if(deltaTime >= this.frameTime){
      this.time += 0.016 * this.options.rotationSpeed;
      this.material.uniforms.uTime.value = this.time;
      this.material.uniforms.uRotCos.value = Math.cos(this.time * 0.3);
      this.material.uniforms.uRotSin.value = Math.sin(this.time * 0.3);
      this.renderer.render(this.scene, this.camera);
      this.lastTime = currentTime - (deltaTime % this.frameTime);
    }

    requestAnimationFrame(this.animate);
  }
}

// ===== initialize =====
const container = document.getElementById('pillar-container');
new LightPillar(container, {
  topColor: '#F4B942',     // gold
  bottomColor: '#FF6F61',  // coral
  intensity: 1.0,
  rotationSpeed: 0.3,
  glowAmount: 0.006,
  pillarWidth: 3.0,
  pillarHeight: 0.4,
  noiseIntensity: 0.4,
  interactive: true,
  quality: 'high'
});
</script>

</body>
</html>
