<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Birthday Quiz Challenge</title>
    <meta name="description" content="Test your birthday knowledge with our fun interactive quiz!">

    <!-- ── Imported Quiz Data (quiz.json) ─────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="quiz.css">

</head>

<body>
    <!-- Background Orbs -->
    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <div class="sparkles" id="sparklesContainer"></div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Saved Toast -->
    <div class="saved-toast" id="savedToast">💾 Results saved!</div>

    <div class="quiz-page">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <a href="../index.html" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 5l-7 7 7 7" />
                </svg>
                Back
            </a>
            <div class="nav-pills">
                <div class="timer-pill" id="timerDisplay">
                    <span>⏱️</span>
                    <span id="timerCountdown" class="timer-num">60</span>s
                </div>
                <div class="score-pill" id="scoreDisplay">
                    <span>🏆</span>
                    <span id="liveScore" class="score-num">0</span>
                    <span style="color:var(--slate);font-weight:400">/</span>
                    <span id="liveTotalSoFar" class="score-num">0</span>
                </div>
            </div>
        </nav>

        <!-- Header -->
        <header class="quiz-header">
            <div class="badge">🎂 Birthday Special</div>
            <h1>Birthday Quiz Challenge</h1>
            <p>Answer all questions, then submit to see your score saved instantly!</p>
        </header>

        <!-- Progress -->
        <div class="progress-wrap" id="progressWrap" style="display:none">
            <div class="progress-meta">
                <span class="q-count" id="progressLabel">Question 1 of 12</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <!-- Quiz Container (questions) -->
        <div class="quiz-container" id="quizContainer">
            <div class="loading-state">
                <div class="spinner"></div>
                <span>Loading quiz…</span>
            </div>
        </div>

        <!-- Results Screen -->
        <div class="results-screen" id="resultsScreen">
            <!-- Score Ring -->
            <div class="results-hero">
                <div class="score-ring">
                    <svg viewBox="0 0 160 160" width="160" height="160">
                        <defs>
                            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#7c3aed" />
                                <stop offset="50%" stop-color="#FF6F61" />
                                <stop offset="100%" stop-color="#F4B942" />
                            </linearGradient>
                        </defs>
                        <circle class="ring-bg" cx="80" cy="80" r="65" />
                        <circle class="ring-val" cx="80" cy="80" r="65" id="ringCircle" stroke-dasharray="408.41"
                            stroke-dashoffset="408.41" />
                    </svg>
                    <div class="ring-label">
                        <span class="ring-score-num" id="ringScoreNum">0</span>
                        <span class="ring-score-total" id="ringScoreTotal">/ 12</span>
                    </div>
                </div>
                <div class="result-grade" id="resultGrade">🎉</div>
                <div class="result-message" id="resultMessage"></div>
                <div class="stats-row">
                    <div class="stat-chip green">✅ <span class="stat-num" id="statCorrect">0</span> Correct</div>
                    <div class="stat-chip red">❌ <span class="stat-num" id="statWrong">0</span> Wrong</div>
                    <div class="stat-chip blue">⏭️ <span class="stat-num" id="statSkipped">0</span> Skipped</div>
                </div>
                <div class="result-actions">
                    <button class="btn btn-ghost" onclick="retakeQuiz()" id="retakeBtn">🔄 Retake Quiz</button>
                    <button class="btn btn-gold" onclick="saveToPDF()" id="saveBtn">💾 Save Results</button>
                    <button class="btn btn-success" onclick="shareScore()" id="shareBtn">🔗 Share Score</button>
                </div>
            </div>

            <!-- Review Section -->
            <div class="review-section" id="reviewSection">
                <div class="review-title">
                    <span>📋</span> Detailed Review
                </div>
                <div id="reviewCards"></div>
            </div>
        </div>
    </div>
    <script id="quiz-data-import" src="quiz.js"></script>

</body>

</html>
